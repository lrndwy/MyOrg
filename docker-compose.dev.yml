# Full stack (API + Web + Admin + infra).
#
# Host access (default):
#   Web   → http://localhost:3000
#   Admin → http://localhost:3001
#   API   → http://localhost:8080
#   MinIO → http://localhost:9000 (API) / http://localhost:9001 (console)
#
# Dev on host (pnpm dev / grit start server): keep infra running and connect via
# POSTGRES_HOST=localhost POSTGRES_PORT=5434 and REDIS_URL=redis://localhost:6380
# in .env — those are the host-mapped ports below.
#
# On a public VPS behind Traefik/Caddy/nginx, remove the `ports:` blocks on app
# services (keep `expose:`) so only the reverse proxy reaches the containers.

services:
  # api:
  #   build:
  #     context: ./apps/api
  #     dockerfile: Dockerfile
  #   container_name: myorg-api
  #   restart: unless-stopped
  #   expose:
  #     - "8080"
  #   ports:
  #     - "${API_PORT:-8080}:8080"
  #   env_file:
  #     - .env
  #   # POSTGRES_* credentials come from .env (env_file). Override host/port so the
  #   # API hits the postgres service on the Docker network — the container always
  #   # listens on 5432 internally; POSTGRES_PORT=5434 in .env is only for host dev.
  #   environment:
  #     POSTGRES_HOST: postgres
  #     POSTGRES_PORT: "5432"
  #     REDIS_URL: redis://redis:6379
  #     MINIO_ENDPOINT: http://minio:9000
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - myorg

  # web:
  #   build:
  #     context: .
  #     dockerfile: apps/web/Dockerfile
  #     args:
  #       NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8080}
  #   container_name: myorg-web
  #   restart: unless-stopped
  #   expose:
  #     - "3000"
  #   ports:
  #     - "${WEB_PORT:-3000}:3000"
  #   networks:
  #     - myorg

  # admin:
  #   build:
  #     context: .
  #     dockerfile: apps/admin/Dockerfile
  #     args:
  #       NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8080}
  #   container_name: myorg-admin
  #   restart: unless-stopped
  #   expose:
  #     - "3000"
  #   ports:
  #     - "${ADMIN_PORT:-3001}:3000"
  #   networks:
  #     - myorg

  postgres:
    image: postgres:16-alpine
    container_name: myorg-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grit}
      POSTGRES_DB: ${POSTGRES_DB:-myorg}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grit} -d ${POSTGRES_DB:-myorg}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myorg

  redis:
    image: redis:7-alpine
    container_name: myorg-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myorg

  minio:
    # -cpuv1: required on hosts without x86-64-v2 (older CPUs / qemu64 VMs)
    image: minio/minio:RELEASE.2025-04-03T14-56-28Z-cpuv1
    container_name: myorg-minio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - myorg
    command: server /data --console-address ":9001"

  ocr:
    image: hertzg/tesseract-server:latest
    container_name: myorg-ocr
    restart: unless-stopped
    ports:
      - "${OCR_PORT:-8884}:8884"
    environment:
      TESSERACT_SERVER_INSTALL_LANGUAGES: ind
    networks:
      - myorg

networks:
  myorg:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
